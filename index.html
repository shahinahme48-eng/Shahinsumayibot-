<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hams Trix Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #f4f7fb; padding-bottom: 110px; text-align: center; }
        .page { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; text-align: left; }
        .main-btn { background: #ff4d4d; color: white; border: none; width: 100%; padding: 16px; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { font-size: 11px; color: #888; flex: 1; cursor: pointer; }
        .nav-item.active-nav { color: #3b2f91; font-weight: bold; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-card { background: #5d6d7e; color: white; padding: 15px; border-radius: 15px; }
        .tab-container { display: flex; justify-content: space-around; margin-bottom: 15px; }
        .tab { padding: 10px 20px; border-radius: 20px; background: #eee; cursor: pointer; font-size: 14px; }
        .tab.active-tab { background: #2ecc71; color: white; }
    </style>
</head>
<body>

    <!-- Home Page (Watch Ads) -->
    <div id="home" class="page active">
        <div class="card" style="text-align: center;">
            <div style="font-size: 50px;">📢</div>
            <h2>Watch Ads</h2>
            <p>Earn H9.00 per ad watched</p>
            <div id="timer-display" style="font-size: 18px; color: red; font-weight: bold; margin-bottom: 10px;"></div>
            <button id="watch-btn" class="main-btn" onclick="handleAdClick()">Watch Ads</button>
            <p>Today's Completed: <span id="view-count">0</span> / 80</p>
        </div>
    </div>

    <!-- Job Task (Social/Telegram) Page -->
    <div id="jobtask" class="page">
        <h3>Create and explore Telegram and social jobs</h3>
        <div class="tab-container">
            <div class="tab active-tab">TELEGRAM</div>
            <div class="tab">OTHER SOCIAL MEDIA</div>
        </div>
        <div class="card">
            <b>Join Telegram Channel</b><br>
            <small>Reward: H3.00</small>
            <button style="float: right; background: #3498db; color: white; border: none; padding: 5px 15px; border-radius: 10px;">Join</button>
        </div>
        <div class="card">
            <b>YouTube Subscribe</b><br>
            <small>Reward: H5.00</small>
            <button style="float: right; background: #e74c3c; color: white; border: none; padding: 5px 15px; border-radius: 10px;">Watch</button>
        </div>
    </div>

    <!-- Wallet & Dashboard Page -->
    <div id="wallet" class="page">
        <div class="card" style="background: linear-gradient(135deg, #3b2f91, #6252d4); color: white; text-align: center;">
            <p>CURRENT BALANCE</p>
            <div id="user-balance" style="font-size: 40px; font-weight: bold;">🐹 30.00</div>
        </div>
        <div class="stat-grid">
            <div class="stat-card">TOTAL TASKS<br><b>4</b></div>
            <div class="stat-card">REFERRALS<br><b>0</b></div>
        </div>
    </div>

    <!-- Nav Bar -->
    <div class="nav-bar">
        <div class="nav-item active-nav" onclick="showPage('home', this)">🏠<br>Home</div>
        <div class="nav-item" onclick="showPage('jobtask', this)">📋<br>Job Task</div>
        <div class="nav-item" onclick="showPage('wallet', this)">💳<br>Wallet</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let user = tg.initDataUnsafe.user || { id: "test_user" };

        const firebaseConfig = {
            apiKey: "AIzaSyAN9TlST44ezqYc1Lxonje-98GHLgQspAE",
            authDomain: "shahinsumayi-bot-db.firebaseapp.com",
            projectId: "shahinsumayi-bot-db",
            databaseURL: "https://shahinsumayi-bot-db-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentBalance = 0;
        let adViews = 0;

        // আপনার কোডের প্রধান ভুল (কোটেশন মার্ক) এখানে ঠিক করা হয়েছে [১২]
        const smartLinks = [
            "https://www.effectivegatecpm.com/xsa7wwtss?key=16f094c1b9d31d03f0c0266beb16fc60", 
            "https://www.effectivegatecpm.com/swgevwv1d9?key=02cc07c5db0ace9d18af033df9db3d68",
            "https://www.effectivegatecpm.com/ji7qa6yqa?key=469c25cfe6c3da23d0e8a5bbde8182ea"
        ];

        db.ref('users/' + user.id).on('value', (snap) => {
            let data = snap.val();
            if(data) {
                currentBalance = data.balance || 0;
                document.getElementById('user-balance').innerText = "🐹 " + currentBalance.toFixed(2);
            }
        });

        function handleAdClick() {
            let randomIndex = Math.floor(Math.random() * smartLinks.length);
            tg.openLink(smartLinks[randomIndex]);

            let btn = document.getElementById('watch-btn');
            btn.disabled = true;
            let timeLeft = 20;
            let countdown = setInterval(() => {
                document.getElementById('timer-display').innerText = timeLeft + "s Remaining";
                timeLeft--;
                if (timeLeft < 0) {
                    clearInterval(countdown);
                    document.getElementById('timer-display').innerText = "";
                    btn.disabled = false;
                    db.ref('users/' + user.id + '/balance').set(currentBalance + 9.00);
                    adViews++;
                    document.getElementById('view-count').innerText = adViews;
                    tg.showAlert("পয়েন্ট যোগ হয়েছে!");
                }
            }, 1000);
        }

        function showPage(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
            el.classList.add('active-nav');
        }
    </script>
</body>
</html>
