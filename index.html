<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shahin Sumayi Bot Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #f4f7fb; padding-bottom: 110px; text-align: center; }
        .page { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .ad-container { background: #fff; margin: 5px 0; display: flex; justify-content: center; overflow: hidden; }
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .main-btn { background: #ff4d4d; color: white; border: none; width: 100%; padding: 16px; border-radius: 15px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .main-btn:disabled { background: #ccc; cursor: not-allowed; }
        #timer-display { font-size: 20px; color: #ff4d4d; font-weight: bold; margin: 10px 0; }
        .list-item { background: white; border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; border-left: 5px solid #6252d4; box-shadow: 0 2px 5px rgba(0,0,0,0.02); text-align: left; }
        .task-btn { background: #00d2ff; color: white; border: none; padding: 8px 12px; border-radius: 10px; font-size: 13px; font-weight: bold; cursor: pointer; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { font-size: 11px; color: #888; flex: 1; cursor: pointer; }
        .nav-item.active-nav { color: #3b2f91; font-weight: bold; }
    </style>
</head>
<body>

    <!-- TOP AD BANNER -->
    <div class="ad-container">
        <script type="text/javascript">
            atOptions = { 'key' : '7039eb71f64ab82ab8865877338fc8fd', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
        </script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/7039eb71f64ab82ab8865877338fc8fd/invoke.js"></script>
    </div>

    <!-- Home Page -->
    <div id="home" class="page active">
        <div class="card">
            <div style="font-size: 50px;">📺</div>
            <h2 id="ad-title">Watch Ads</h2>
            <p id="ad-instruction">Stay 20 seconds for 10.00 H</p>
            <div id="timer-display"></div>
            <button id="watch-btn" class="main-btn" onclick="handleAdClick()">Watch Ads</button>
            <p style="margin-top: 10px; font-size: 12px; color: #666;">Ads Viewed: <span id="view-count">0</span> / 5</p>
        </div>
    </div>

    <!-- Social Tasks Page -->
    <div id="jobtask" class="page">
        <h3>Social Tasks (+30 H)</h3>
        <div class="list-item">
            <div><b>Telegram</b><br><small>Join @personaapps</small></div>
            <button class="task-btn" onclick="completeSocialTask('https://t.me/personaapps', 30)">Join</button>
        </div>
        <div class="list-item">
            <div><b>Blogger</b><br><small>Stay 60 Seconds</small> <span id="blog-timer" style="color:red;"></span></div>
            <button id="blog-btn" class="task-btn" onclick="startBlogTask('https://primetrends24.blogspot.com', 30)">Visit</button>
        </div>
        <div class="list-item">
            <div><b>YouTube</b><br><small>Subscribe & Watch</small></div>
            <button class="task-btn" onclick="completeSocialTask('https://www.youtube.com/@Shahin_sumaiya1', 30)">Follow</button>
        </div>
        <div class="list-item">
            <div><b>TikTok</b><br><small>Follow Profile</small></div>
            <button class="task-btn" onclick="completeSocialTask('https://www.tiktok.com/@shahin_sumaiya0', 30)">Follow</button>
        </div>
    </div>

    <!-- Wallet Page -->
    <div id="wallet" class="page">
        <div class="card" style="background: linear-gradient(135deg, #3b2f91, #6252d4); color: white;">
            <p>BALANCE</p>
            <div id="user-balance" style="font-size: 40px; font-weight: bold;">🐹 0.00</div>
        </div>
        <div class="card">
            <input type="text" id="binanceId" placeholder="Binance Pay ID / Address" style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd; margin-bottom:10px; box-sizing: border-box;">
            <button class="main-btn" style="background:#f3ba2f; color:#000;" onclick="withdraw()">Withdraw Binance</button>
        </div>
    </div>

    <!-- BOTTOM AD BANNER -->
    <div class="ad-container" style="position: fixed; bottom: 60px; width: 100%;">
        <script type="text/javascript">
            atOptions = { 'key' : '7039eb71f64ab82ab8865877338fc8fd', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
        </script>
        <script type="text/javascript" src="https://www.highperformanceformat.com/7039eb71f64ab82ab8865877338fc8fd/invoke.js"></script>
    </div>

    <!-- Nav Bar -->
    <div class="nav-bar">
        <div class="nav-item active-nav" onclick="showPage('home', this)">🏠<br>Home</div>
        <div class="nav-item" onclick="showPage('jobtask', this)">📋<br>Tasks</div>
        <div class="nav-item" onclick="showPage('wallet', this)">💳<br>Wallet</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let user = tg.initDataUnsafe.user || { id: "test_user" };

        const firebaseConfig = {
            apiKey: "AIzaSyAN9TlST44ezqYc1Lxonje-98GHLgQspAE",
            authDomain: "shahinsumayi-bot-db.firebaseapp.com",
            projectId: "shahinsumayi-bot-db",
            databaseURL: "https://shahinsumayi-bot-db-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentBalance = 0;
        let adViews = 0;

        // আপনার ১১ নম্বর ছবির ১০টি Smartlink এখানে একটার পর একটা বসান [১১]
        const smartLinks = [
                            
            "https://www.effectivegatecpm.com/xsa7wwtss?key=16f094c1b9d31d03f0c0266beb16fc60, 
            "https://www.effectivegatecpm.com/swgevwv1d9?key=02cc07c5db0ace9d18af033df9db3d68", 
            "https://www.effectivegatecpm.com/ji7qa6yqa?key=469c25cfe6c3da23d0e8a5bbde8182ea", 
            "https://www.effectivegatecpm.com/nxsh7tch6?key=b61c56d835ad538439ed9b8a469aac26", 
            "https://www.effectivegatecpm.com/jwzin8c8?key=59b674e6dba381fc9f3ac1b91b9f48f3",
            "https://www.effectivegatecpm.com/he7q04349?key=9321b950bdc20ad0ebaf96353be76bf5", 
            "https://www.effectivegatecpm.com/d3aeye244?key=ba3f3b017454454f9638f4bfd2d43a65", 
            "https://www.effectivegatecpm.com/fzymdu01?key=34743bb35051ea84679cd6e292a27d37", 
            "https://www.effectivegatecpm.com/cr6pu750?key=f5210f2c411fe9f09c2b740609f8d192", 
            "https://www.effectivegatecpm.com/su9vwnjzdv?key=c60c1fb73155df79184d55ac29e6dd8a",
            "https://www.effectivegatecpm.com/tn3ivxubdb?key=94e9abf53a33b92f6352fc9a94435f19",
        ];

        db.ref('users/' + user.id).on('value', (snap) => {
            let data = snap.val();
            if(data) {
                currentBalance = data.balance;
                document.getElementById('user-balance').innerText = "🐹 " + currentBalance.toFixed(2);
            } else {
                db.ref('users/' + user.id).set({ balance: 0 });
            }
        });

        function handleAdClick() {
            let isClickTask = (adViews + 1) % 5 === 0;
            let waitTime = isClickTask ? 2 : 20; // ৫ নম্বর অ্যাডে ২ সেকেন্ড, বাকিগুলোতে ২০ সেকেন্ড [১, ৪]
            
            let randomLink = smartLinks[Math.floor(Math.random() * smartLinks.length)];
            tg.openLink(randomLink);
            
            let btn = document.getElementById('watch-btn');
            let timerDisplay = document.getElementById('timer-display');
            btn.disabled = true;

            let timeLeft = waitTime;
            let countdown = setInterval(() => {
                timerDisplay.innerText = timeLeft + "s Remaining";
                timeLeft--;
                if (timeLeft < 0) {
                    clearInterval(countdown);
                    timerDisplay.innerText = "";
                    btn.disabled = false;
                    let reward = isClickTask ? 20 : 10;
                    db.ref('users/' + user.id + '/balance').set(currentBalance + reward);
                    adViews++;
                    document.getElementById('view-count').innerText = adViews % 5;
                    tg.showAlert(isClickTask ? "Click Bonus: 20 Points!" : "Reward: 10 Points!");
                }
            }, 1000);
        }

        function startBlogTask(link, reward) {
            tg.openLink(link);
            let timeLeft = 60;
            let btn = document.getElementById('blog-btn');
            btn.disabled = true;
            let timer = setInterval(() => {
                document.getElementById('blog-timer').innerText = "(" + timeLeft + "s)";
                timeLeft--;
                if (timeLeft < 0) {
                    clearInterval(timer);
                    document.getElementById('blog-timer').innerText = "";
                    db.ref('users/' + user.id + '/balance').set(currentBalance + reward);
                    btn.innerText = "Completed";
                    tg.showAlert("Blog Task Verified!");
                }
            }, 1000);
        }

        function completeSocialTask(link, reward) {
            tg.openLink(link);
            db.ref('users/' + user.id + '/balance').set(currentBalance + reward);
            tg.showAlert("Points Added!");
        }

        function showPage(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
            el.classList.add('active-nav');
        }

        function withdraw() {
            let id = document.getElementById('binanceId').value;
            if(id.length > 5 && currentBalance >= 500) {
                db.ref('withdrawals').push({ userId: user.id, binanceId: id, amount: currentBalance });
                tg.showAlert("Request Sent!");
            } else {
                tg.showAlert("Min 500 H needed");
            }
        }
    </script>
</body>
</html>
